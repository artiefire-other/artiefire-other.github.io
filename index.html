<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Karaoke Popularity Ranker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        #countdownOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #countdownOverlay.active { opacity: 1; pointer-events: auto; }
        #countdownOverlay.hidden-custom { opacity: 0; }

        .count-number {
            font-size: 8rem;
            font-weight: 800;
            color: #a855f7;
            text-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
<div class="max-w-4xl mx-auto">
    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent mb-2">
            Karaoke Ranker
        </h1>
        <p class="text-slate-400">Precision matching for the best singing experience</p>
    </header>

    <div class="glass p-6 rounded-2xl mb-8">
        <div class="flex flex-col md:flex-row gap-4">
            <div class="flex-1 relative">
                <input type="text" id="songQuery"
                       onkeydown="if(event.key === 'Enter') searchKaraoke()"
                       placeholder="e.g. Sunday Cranberries"
                       class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-white">
            </div>
            <button onclick="searchKaraoke()" id="searchBtn"
                    class="bg-purple-600 hover:bg-purple-700 text-white font-semibold px-8 py-3 rounded-xl transition-all disabled:opacity-50">
                Search
            </button>
        </div>
    </div>

    <div id="statusMessage" class="text-center py-4 hidden"></div>

    <div id="playerSection" class="hidden mb-8">
        <div class="glass p-4 rounded-2xl border-2 border-purple-500/30">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-semibold text-purple-300">Singing Now</h2>
                <button onclick="closePlayer()" class="text-slate-400 hover:text-white">✕ Close</button>
            </div>

            <div class="video-container relative" id="videoWrapper">
                <div id="countdownOverlay" class="hidden-custom">
                    <div id="loaderStatus" class="text-sm uppercase tracking-widest text-slate-400 mb-4 font-bold">Mic Check...</div>
                    <div id="countDisplay" class="count-number">3</div>
                </div>
                <div id="karaokePlayer"></div>
            </div>
            <div class="flex justify-between items-center mt-3">
                <p class="text-slate-500 text-xs">[Space] Pause | [F] Fullscreen</p>
                <button onclick="requestManualFullscreen()" class="text-xs text-purple-400 hover:text-purple-300 font-bold uppercase">⛶ Fullscreen</button>
            </div>
        </div>
    </div>

    <div id="resultsContainer" class="hidden glass rounded-2xl overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="bg-slate-800/50 text-slate-300 text-sm">
                <th class="p-4 w-16 text-center">Rank</th>
                <th class="p-4">Track Version</th>
                <th class="p-4 text-center">Relevance</th>
                <th class="p-4 text-right">Action</th>
            </tr>
            </thead>
            <tbody id="resultsBody" class="divide-y divide-slate-700/50"></tbody>
        </table>
    </div>
</div>

<script>
    // API Key (Updated)
    const apiKey = "AIzaSyA6zO2twnSKMGnonr6lAGfDzvriE3_EtM4";
    let ytPlayer;
    let countdownTimer = null;

    // THE GOLD LIST - Professional Karaoke Creators
    const GOLD_CHANNELS = ['fakeyoke', 'sing king', 'karafun', 'sing2karaoke', 'karaoketv', 'cc karaoke', 'stingray karaoke', 'piano karaoke', 'vocal-star'];

    document.addEventListener('keydown', (e) => {
        if (e.code === 'KeyF') requestManualFullscreen();
        if (e.code === 'Space' && document.activeElement.id !== 'songQuery') {
            if (ytPlayer?.getPlayerState) {
                e.preventDefault();
                ytPlayer.getPlayerState() === 1 ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
            }
        }
    });

    async function fetchWithRetry(url, retries = 5) {
        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(url);
                if (response.ok) return await response.json();
                if (response.status === 403 || response.status === 429) break;
            } catch (e) {}
            await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
        }
        throw new Error('Fetch failed');
    }

    async function searchKaraoke() {
        if (!apiKey) {
            const status = document.getElementById('statusMessage');
            status.innerHTML = `<span class="text-red-400">Please provide a valid YouTube API key.</span>`;
            status.classList.remove('hidden');
            return;
        }

        const userInput = document.getElementById('songQuery').value.trim();
        if (!userInput) return;

        const btn = document.getElementById('searchBtn');
        const status = document.getElementById('statusMessage');
        const container = document.getElementById('resultsContainer');

        btn.disabled = true;
        status.innerHTML = `<span class="animate-pulse text-purple-400 font-medium">Analyzing tracks for best quality...</span>`;
        status.classList.remove('hidden');
        container.classList.add('hidden');

        try {
            const query = `${userInput} karaoke`;
            const ytSearchUrl = `https://www.googleapis.com/youtube/v3/search?part=id,snippet&q=${encodeURIComponent(query)}&type=video&maxResults=30&key=${apiKey}`;
            const searchData = await fetchWithRetry(ytSearchUrl);

            if (!searchData.items || searchData.items.length === 0) {
                status.innerHTML = "No results found.";
                btn.disabled = false;
                return;
            }

            const videoIds = searchData.items.map(item => item.id.videoId).join(',');
            const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=statistics,snippet&id=${videoIds}&key=${apiKey}`;
            const statsData = await fetchWithRetry(statsUrl);

            // Refined Token Matching logic - handle smaller words better
            const inputTokens = userInput.toLowerCase().split(/\s+/).filter(t => t.length > 1);

            let results = statsData.items.map(item => {
                const title = item.snippet.title.toLowerCase();
                const channel = item.snippet.channelTitle.toLowerCase();
                const combined = title + " " + channel;

                const matchedTokens = inputTokens.filter(t => combined.includes(t));
                const coverage = matchedTokens.length / inputTokens.length;

                // Base score logic: Engagement vs Quality
                let score = (parseInt(item.statistics.likeCount || 0) * 10) + (parseInt(item.statistics.viewCount || 0) / 1000);

                // 1. Gold List Multiplier (Extremely high priority for trusted creators)
                if (GOLD_CHANNELS.some(g => channel.includes(g))) {
                    score *= 1000;
                }

                // 2. Strict Match Boosting
                // If the title contains the full user query as a single phrase
                if (title.includes(userInput.toLowerCase())) {
                    score *= 100;
                }

                // 3. Freshness Weighting
                const publishedDate = new Date(item.snippet.publishedAt);
                const ageDays = (new Date() - publishedDate) / (1000 * 60 * 60 * 24);
                if (ageDays < 365) score *= 4; // < 1 year
                else if (ageDays < 730) score *= 2; // < 2 years
                else if (ageDays > 3650) score *= 0.2; // > 10 years (likely lower audio quality)

                // 4. Content Filters
                if (channel.includes('topic') || title.includes('official video') || title.includes('live')) {
                    score *= 0.0001;
                }

                // Penalize results that don't emphasize 'karaoke' or 'instrumental'
                if (!title.includes('karaoke') && !title.includes('instrumental')) {
                    score *= 0.05;
                }

                return {
                    id: item.id,
                    title: item.snippet.title,
                    channel: item.snippet.channelTitle,
                    score: Math.round(score * coverage),
                    thumbnail: item.snippet.thumbnails.medium.url,
                    coverage: Math.round(coverage * 100)
                };
            })
            .filter(i => i.score > 0 && i.coverage >= 50)
            .sort((a, b) => b.score - a.score);

            renderResults(results);
            status.classList.add('hidden');
            container.classList.remove('hidden');
        } catch (e) {
            status.innerHTML = "Error loading results. Check your API quota or connection.";
            console.error(e);
        } finally {
            btn.disabled = false;
        }
    }

    function renderResults(results) {
        const tbody = document.getElementById('resultsBody');
        if (results.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-slate-500">No high-confidence matches. Try being more specific.</td></tr>`;
            return;
        }
        tbody.innerHTML = results.slice(0, 10).map((item, i) => `
            <tr class="hover:bg-slate-800/30 transition-colors group cursor-pointer" onclick="initVideoPlayer('${item.id}')">
                <td class="p-4 text-slate-500 font-mono text-center">#${i + 1}</td>
                <td class="p-4">
                    <div class="flex items-center gap-4">
                        <img src="${item.thumbnail}" class="w-16 h-10 rounded border border-slate-700 object-cover">
                        <div>
                            <div class="font-medium text-slate-200 group-hover:text-purple-400">${item.title}</div>
                            <div class="text-[10px] uppercase text-slate-500 font-bold mt-1">${item.channel}</div>
                        </div>
                    </div>
                </td>
                <td class="p-4 text-center">
                    <div class="text-xs text-slate-400 mb-1">${item.coverage}% Match</div>
                    <div class="w-16 h-1 bg-slate-700 mx-auto rounded-full overflow-hidden">
                        <div class="h-full bg-purple-500" style="width: ${item.coverage}%"></div>
                    </div>
                </td>
                <td class="p-4 text-right">
                    <button class="bg-purple-600/10 hover:bg-purple-600 text-purple-400 hover:text-white border border-purple-500/50 text-[10px] font-bold py-1.5 px-3 rounded-lg uppercase">Play</button>
                </td>
            </tr>
        `).join('');
    }

    function initVideoPlayer(id) {
        document.getElementById('playerSection').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        const overlay = document.getElementById('countdownOverlay');
        overlay.classList.remove('hidden-custom');
        overlay.classList.add('active');

        if (ytPlayer?.loadVideoById) {
            ytPlayer.loadVideoById(id);
            ytPlayer.pauseVideo();
            startCountdown();
        } else {
            ytPlayer = new YT.Player('karaokePlayer', {
                height: '100%', width: '100%', videoId: id,
                playerVars: { 'autoplay': 0, 'modestbranding': 1, 'controls': 1 },
                events: { 'onReady': startCountdown }
            });
        }
    }

    function startCountdown() {
        let count = 3;
        const display = document.getElementById('countDisplay');
        display.innerText = count;
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(() => {
            count--;
            if (count > 0) display.innerText = count;
            else if (count === 0) {
                display.innerText = "GO!";
                ytPlayer.playVideo();
                requestManualFullscreen();
            } else {
                clearInterval(countdownTimer);
                document.getElementById('countdownOverlay').classList.add('hidden-custom');
            }
        }, 1000);
    }

    function requestManualFullscreen() {
        const el = document.querySelector('#karaokePlayer iframe') || document.getElementById('karaokePlayer');
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
        else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    function closePlayer() {
        if (ytPlayer?.stopVideo) ytPlayer.stopVideo();
        document.getElementById('playerSection').classList.add('hidden');
    }
</script>
</body>
