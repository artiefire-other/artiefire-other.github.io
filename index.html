<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Arthur's Karaoke Algorithm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #000000; 
            color: #ffffff; 
            overflow-x: hidden; 
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Snappy Sharp UI */
        .sharp-card { 
            background: #0a0a0a; 
            border: 1px solid #222; 
            box-shadow: 0 4px 0 #111;
        }

        .input-sharp {
            background: #000;
            border: 2px solid #333;
            border-radius: 0;
            transition: border-color 0.2s;
        }

        .input-sharp:focus {
            border-color: #a855f7;
            outline: none;
        }

        .btn-sharp {
            background: #ffffff;
            color: #000000;
            border-radius: 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.1s;
        }

        .btn-sharp:hover {
            background: #a855f7;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 4px 0 #6b21a8;
        }

        .btn-sharp:active {
            transform: translateY(0);
            box-shadow: 0 0 0 transparent;
        }

        .video-container { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            border: 2px solid #333;
            background: #000; 
        }

        .video-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
        }
        
        #countdownOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            pointer-events: none; 
            transition: opacity 0.3s ease;
        }
        
        #countdownOverlay.active { opacity: 1; pointer-events: auto; }
        #countdownOverlay.hidden-custom { opacity: 0; }

        .count-number {
            font-size: 8rem;
            font-weight: 800;
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
        }

        .gold-highlight {
            background: #0f0a14 !important;
            border-left: 4px solid #a855f7 !important;
        }

        /* Table styling */
        th {
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.7rem;
            color: #666;
            border-bottom: 1px solid #222;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-5xl font-bold mono uppercase tracking-tighter mb-2">
                Arthur's Karaoke Algorithm
            </h1>
            <p class="text-slate-500 font-medium">Input a Song Title (and Maybe the Artist if Necessary)</p>
        </header>

        <div class="sharp-card p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-0">
                <div class="flex-1 relative">
                    <input type="text" id="songQuery" 
                        onkeydown="if(event.key === 'Enter') searchKaraoke()"
                        placeholder="SEARCH TRACK..." 
                        class="w-full input-sharp px-4 py-4 text-white mono">
                </div>
                <button onclick="searchKaraoke()" id="searchBtn"
                    class="btn-sharp px-10 py-4 transition-all disabled:opacity-50">
                    Search
                </button>
            </div>
        </div>

        <div id="statusMessage" class="text-center py-4 hidden mono text-xs uppercase tracking-widest"></div>

        <div id="playerSection" class="hidden mb-8">
            <div class="sharp-card p-4 border-t-4 border-t-purple-600">
                <div class="flex justify-end items-center mb-4">
                    <button onclick="closePlayer()" class="text-slate-500 hover:text-white transition-colors text-xs mono">CLOSE [ESC]</button>
                </div>
                
                <div class="video-container relative" id="videoWrapper">
                    <div id="countdownOverlay" class="hidden-custom">
                        <div id="countDisplay" class="count-number">3</div>
                    </div>
                    <div id="karaokePlayer"></div>
                </div>
                <div class="flex justify-between items-center mt-3">
                    <p class="text-slate-600 text-[10px] mono uppercase">Space: Toggle | F: Fullscreen</p>
                    <button onclick="requestManualFullscreen()" class="text-[10px] text-white hover:text-purple-400 font-bold uppercase mono underline">Fullscreen</button>
                </div>
            </div>
        </div>

        <div id="resultsContainer" class="hidden sharp-card overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-black text-slate-300">
                        <th class="p-4 w-16 text-center">ID</th>
                        <th class="p-4">Track Metadata</th>
                        <th class="p-4 text-center">Match</th>
                        <th class="p-4 text-right">Cmd</th>
                    </tr>
                </thead>
                <tbody id="resultsBody" class="divide-y divide-[#222]"></tbody>
            </table>
        </div>
    </div>

    <script>
        const apiKey = "AIzaSyA6zO2twnSKMGnonr6lAGfDzvriE3_EtM4"; 
        let ytPlayer;
        let countdownTimer = null;

        const GOLD_CHANNELS = ['fakeyoke', 'sing king', 'karafun', 'sing2karaoke', 'karaoketv', 'cc karaoke', 'stingray karaoke', 'piano karaoke', 'vocal-star'];

        document.addEventListener('keydown', (e) => {
            if (document.activeElement.id === 'songQuery') return;
            if (e.code === 'KeyF') { e.preventDefault(); requestManualFullscreen(); }
            if (e.code === 'Escape') { e.preventDefault(); closePlayer(); }
            if (e.code === 'Space') {
                if (ytPlayer?.getPlayerState) {
                    e.preventDefault();
                    ytPlayer.getPlayerState() === 1 ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
                }
            }
        });

        const normalize = (str) => str.toLowerCase().replace(/[^a-z0-9]/g, '');

        async function fetchWithRetry(url, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url);
                    if (response.ok) return await response.json();
                    if (response.status === 403 || response.status === 429) break; 
                } catch (e) {}
                await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
            }
            throw new Error('Fetch failed');
        }

        async function searchKaraoke() {
            const userInput = document.getElementById('songQuery').value.trim();
            if (!userInput) return;

            const btn = document.getElementById('searchBtn');
            const status = document.getElementById('statusMessage');
            const container = document.getElementById('resultsContainer');
            
            btn.disabled = true;
            status.innerHTML = `<span class="animate-pulse text-white">SEARCHING FOR YOUR TRACK...</span>`;
            status.classList.remove('hidden');
            container.classList.add('hidden');

            try {
                const query = `${userInput} karaoke`;
                const ytSearchUrl = `https://www.googleapis.com/youtube/v3/search?part=id,snippet&q=${encodeURIComponent(query)}&type=video&maxResults=30&key=${apiKey}`;
                const searchData = await fetchWithRetry(ytSearchUrl);
                
                if (!searchData.items || searchData.items.length === 0) {
                    status.innerHTML = "STATUS: NO MATCH FOUND.";
                    btn.disabled = false;
                    return;
                }

                const videoIds = searchData.items.map(item => item.id.videoId).join(',');
                const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=statistics,snippet&id=${videoIds}&key=${apiKey}`;
                const statsData = await fetchWithRetry(statsUrl);

                const inputTokens = userInput.toLowerCase().split(/\s+/).filter(t => t.length > 1);
                const normalizedInput = normalize(userInput);

                let results = statsData.items.map(item => {
                    const rawTitle = item.snippet.title;
                    const titleLower = rawTitle.toLowerCase();
                    const channel = item.snippet.channelTitle.toLowerCase();
                    const normalizedTitle = normalize(rawTitle);
                    
                    const matchedTokens = inputTokens.filter(t => titleLower.includes(t) || channel.includes(t));
                    const coverage = matchedTokens.length / inputTokens.length;

                    let score = (parseInt(item.statistics.likeCount || 0) * 10) + (parseInt(item.statistics.viewCount || 0) / 1000);
                    const isGold = GOLD_CHANNELS.some(g => channel.includes(g));
                    if (isGold) score *= 1000;

                    if (titleLower.includes(userInput.toLowerCase())) score *= 200; 

                    const titleWithoutNoise = titleLower.replace('karaoke', '').replace('version', '').replace(/[^a-z0-9]/g, '').trim();
                    const inputWithoutNoise = userInput.toLowerCase().replace(/[^a-z0-9]/g, '').trim();
                    
                    const lengthDiff = Math.abs(titleWithoutNoise.length - inputWithoutNoise.length);
                    if (lengthDiff < 5) score *= 500;

                    if (normalizedTitle.includes(normalizedInput)) score *= 150;

                    const publishedDate = new Date(item.snippet.publishedAt);
                    const ageDays = (new Date() - publishedDate) / (1000 * 60 * 60 * 24);
                    if (ageDays < 365) score *= 4; 

                    if (channel.includes('topic') || titleLower.includes('official video') || titleLower.includes('live')) score *= 0.0001;
                    if (!titleLower.includes('karaoke') && !titleLower.includes('instrumental')) score *= 0.05;

                    return {
                        id: item.id,
                        title: rawTitle,
                        channel: item.snippet.channelTitle,
                        score: Math.round(score * coverage),
                        thumbnail: item.snippet.thumbnails.medium.url,
                        coverage: Math.round(coverage * 100),
                        isGold: isGold
                    };
                })
                .filter(i => i.score > 0 && i.coverage >= 50)
                .sort((a, b) => b.score - a.score);

                renderResults(results);
                status.classList.add('hidden');
                container.classList.remove('hidden');
            } catch (e) {
                status.innerHTML = `<span class="text-red-500">ERROR: SOMETHING WENT WRONG.</span>`;
            } finally {
                btn.disabled = false;
            }
        }

        function renderResults(results) {
            const tbody = document.getElementById('resultsBody');
            if (results.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center mono text-slate-500 text-xs">NO RESULTS MATCHED SEARCH PARAMETERS.</td></tr>`;
                return;
            }
            tbody.innerHTML = results.slice(0, 10).map((item, i) => `
                <tr class="hover:bg-white/5 transition-colors group cursor-pointer ${item.isGold ? 'gold-highlight' : ''}" onclick="initVideoPlayer('${item.id}')">
                    <td class="p-4 text-slate-500 mono text-xs text-center">${(i + 1).toString().padStart(2, '0')}</td>
                    <td class="p-4">
                        <div class="flex items-center gap-4">
                            <div class="w-16 h-10 bg-[#111] border border-[#333] flex-shrink-0 overflow-hidden">
                                <img src="${item.thumbnail}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all">
                            </div>
                            <div>
                                <div class="font-bold text-white group-hover:text-purple-400 text-sm mono">
                                    ${item.title.toUpperCase()}
                                </div>
                                <div class="text-[10px] text-slate-500 font-bold mt-1 mono">${item.channel.toUpperCase()}</div>
                            </div>
                        </div>
                    </td>
                    <td class="p-4 text-center">
                        <div class="mono text-[10px] text-white font-bold">${item.coverage}%</div>
                    </td>
                    <td class="p-4 text-right">
                        <span class="inline-block border border-white group-hover:border-purple-500 px-3 py-1 text-[9px] mono uppercase font-bold group-hover:text-purple-400 transition-colors">Sing</span>
                    </td>
                </tr>
            `).join('');
        }

        function initVideoPlayer(id) {
            document.getElementById('playerSection').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            const overlay = document.getElementById('countdownOverlay');
            overlay.classList.remove('hidden-custom');
            overlay.classList.add('active');

            if (ytPlayer?.loadVideoById) {
                ytPlayer.loadVideoById(id);
                ytPlayer.pauseVideo();
                startCountdown();
            } else {
                ytPlayer = new YT.Player('karaokePlayer', {
                    height: '100%', width: '100%', videoId: id,
                    playerVars: { 'autoplay': 0, 'modestbranding': 1, 'controls': 1 },
                    events: { 'onReady': startCountdown }
                });
            }
        }

        function startCountdown() {
            let count = 3;
            const display = document.getElementById('countDisplay');
            display.innerText = count;
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                count--;
                if (count > 0) display.innerText = count;
                else if (count === 0) {
                    display.innerText = "GO";
                    ytPlayer.playVideo();
                    requestManualFullscreen();
                } else {
                    clearInterval(countdownTimer);
                    document.getElementById('countdownOverlay').classList.add('hidden-custom');
                }
            }, 1000);
        }

        function requestManualFullscreen() {
            const el = document.querySelector('#karaokePlayer iframe');
            if (!el) return;
            
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
            else if (el.msRequestFullscreen) el.msRequestFullscreen();
        }

        function closePlayer() {
            if (ytPlayer?.stopVideo) ytPlayer.stopVideo();
            document.getElementById('playerSection').classList.add('hidden');
        }
    </script>
</body>
</html>
